name: VT Livehunt

on:
  # Auto-trigger: fires immediately after the repo scanner finishes
  workflow_run:
    workflows: ["Lure Scanner"]
    types: [completed]

  # Standalone cron: also runs every 6h independently (catches notifications
  # from files submitted to VT outside of repo scan windows)
  schedule:
    - cron: '*/30 * * * *'

  # Manual trigger for on-demand runs or testing
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days of notifications to look back'
        required: false
        default: '7'

concurrency:
  group: vt-hunt-run
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  vt-hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VT livehunt
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          VT_HUNT_RULESET_NAMES: ${{ secrets.VT_HUNT_RULESET_NAMES }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # workflow_run and schedule use 1 day lookback (frequent runs, small window)
          # manual dispatch uses the input value
          DAYS_BACK: ${{ github.event.inputs.days_back || '1' }}
          MIN_SCORE: '5'
        run: python run_vt_hunt.py
